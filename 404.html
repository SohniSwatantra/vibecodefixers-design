<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - VibeCodeFixers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 480px; }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        .logo span { color: #10E80C; }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            color: #10E80C;
        }
        p {
            font-size: 16px;
            color: #B5B5B5;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #10E80C;
            color: #000;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #4DFF4A;
            transform: translateY(-1px);
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #10E80C;
            display: inline-block;
            animation: pulse 2s infinite;
            margin-right: 4px;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .status {
            margin-top: 40px;
            font-size: 13px;
            color: #7A7A7A;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">Vibe<span>CodeFixers</span></div>
        <h1>Under Construction</h1>
        <p>This page is being built. We're working on something great. Head back to the landing page to explore the design.</p>
        <a href="/dark-mode.html" class="btn">Back to Landing Page &raquo;</a>
        <div class="status"><span class="dot"></span> Design preview mode</div>
    </div>
</body>
</html>
