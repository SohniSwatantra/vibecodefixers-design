<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCodeFixers - Design Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 520px; }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .logo span { color: #10E80C; }
        .tagline { font-size: 14px; color: #7A7A7A; margin-bottom: 48px; }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            color: #B5B5B5;
        }
        .buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s;
        }
        .btn-dark {
            background: #10E80C;
            color: #000;
        }
        .btn-dark:hover {
            background: #4DFF4A;
            box-shadow: 0 0 20px rgba(16,232,12,0.2);
            transform: translateY(-2px);
        }
        .btn-light {
            background: transparent;
            color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.14);
        }
        .btn-light:hover {
            border-color: rgba(16,232,12,0.3);
            background: rgba(16,232,12,0.08);
            color: #10E80C;
            transform: translateY(-2px);
        }
        .btn-funky {
            background: linear-gradient(135deg, #E91E8C, #D4A843);
            color: #fff;
        }
        .btn-funky:hover {
            background: linear-gradient(135deg, #FF45A8, #E8BC55);
            box-shadow: 0 0 24px rgba(233,30,140,0.3);
            transform: translateY(-2px);
        }
        .note {
            margin-top: 48px;
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">Vibe<span>CodeFixers</span></div>
        <div class="tagline">Fix. Secure. Optimize.</div>
        <h1>Choose a design version to preview</h1>
        <div class="buttons">
            <a href="dark-mode.html" class="btn btn-dark">Dark Mode &raquo;</a>
            <a href="light-mode.html" class="btn btn-light">Light Mode &raquo;</a>
            <a href="funky-mode.html" class="btn btn-funky">Funky Mode &raquo;</a>
        </div>
        <div class="note">Design preview &mdash; all links stay on the landing page.<br>No pages are broken. This is a design prototype.</div>
    </div>
</body>
</html>
